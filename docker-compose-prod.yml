name: ifts-ai-prod

services:
  app:
    image: python:3.11-slim
    restart: unless-stopped
    working_dir: /app
    env_file:
      - .env.deploy-prod
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
    volumes:
      - .:/app
      - pip-cache-prod:/root/.cache/pip
    ports:
      - "${APP_PORT:-8600}:8000"
    command: >
      sh -c "pip install -r requirements.txt gunicorn &&
      python manage.py migrate &&
      gunicorn ifts_ai.wsgi:application --bind 0.0.0.0:8000 --workers ${WEB_CONCURRENCY:-2}"

volumes:
  pip-cache-prod:
