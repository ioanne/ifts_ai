name: Deploy Test

on:
  push:
    branches:
      - deploy-test
  workflow_dispatch:

concurrency:
  group: deploy-test
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Validar entorno
        run: test -f .env.deploy-test

      - name: Ejecutar deploy
        run: sh scripts/deploy.sh .env.deploy-test docker-compose-test.yml
